server {
    listen 80;
    listen [::]:80;
    server_name philipandperla.com www.philipandperla.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://philipandperla.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.philipandperla.com;

    ssl_certificate /etc/letsencrypt/live/philipandperla.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/philipandperla.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://philipandperla.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name philipandperla.com;

    ssl_certificate /etc/letsencrypt/live/philipandperla.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/philipandperla.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8104;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
